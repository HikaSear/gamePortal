<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenWorld</title>
    <style>
        /* Общие стили фона */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000d01; /* Светло-зеленый фон страницы */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Контейнер с пропорциями 16:9 */
        .ratio-container {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background-color: #2e7d32;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 2px solid #a5d6a7;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Стиль текста */
        .content {
            color: #fcfcfc; /* Темно-зеленый текст */
            font-size: clamp(1.2rem, 4vw, 2rem);
            line-height: 1.4;
            font-weight: 500;
        }

        /* Стиль ссылки */
        .tg-link {
            color: #4caf50;
            text-decoration: none;
            border-bottom: 2px solid #4caf50;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .tg-link:hover {
            color: #1b5e20;
            border-bottom-color: #1b5e20;
            background-color: #f1f8e9;
        }
    </style>
</head>
<body>

    <div class="ratio-container">
        <div class="content">
            Друзья, взаимодействие с проектом через сайт прекращено.<br>
            Пожалуйста, используйте<br><a href="https://t.me/openworld_gamebot" class="tg-link">телеграм бота</a>
        </div>
    </div>

</body>
</html>
